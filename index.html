<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechPulse — Berita & Tren Teknologi Terkini</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090f;--bg2:#0c0f1a;--surface:#111624;--accent:#00d4ff;--accent-dim:rgba(0,212,255,0.12);
  --text:#dde3f0;--text-sub:#8892ab;--border:rgba(255,255,255,0.07);--shadow:0 4px 24px rgba(0,0,0,0.5);
}
[data-theme="light"] {
  --bg:#f2f1ec;--bg2:#e8e6df;--surface:#ffffff;--accent:#006fcc;--accent-dim:rgba(0,111,204,0.10);
  --text:#12151e;--text-sub:#5a6278;--border:rgba(0,0,0,0.09);--shadow:0 4px 24px rgba(0,0,0,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); transition: 0.3s; }
nav { position:sticky; top:0; background:var(--bg); border-bottom:1px solid var(--border); padding:1rem; display:flex; justify-content:space-between; align-items:center; z-index:100; }
.logo { font-family:'Fraunces',serif; font-weight:900; font-size:1.5rem; }
.logo em { color:var(--accent); font-style:normal; }
.hero { padding:3rem 1.5rem; text-align:center; }
.hero h1 { font-family:'Fraunces',serif; font-size:2.5rem; margin-bottom:1rem; }
.card { background:var(--surface); border-radius:16px; margin-bottom:1rem; padding:1.5rem; border:1px solid var(--border); box-shadow:var(--shadow); cursor:pointer; }
.c-cat { font-size:0.7rem; font-weight:700; color:var(--accent); text-transform:uppercase; margin-bottom:0.5rem; }
.c-title { font-family:'Fraunces',serif; font-size:1.2rem; margin-bottom:0.5rem; }
.wrap { max-width:800px; margin:0 auto; padding:1.5rem; }
#pb { position:fixed; top:0; left:0; height:3px; background:var(--accent); width:0; z-index:1000; }
.btn-theme { background:var(--accent-dim); color:var(--accent); border:none; padding:0.5rem 1rem; border-radius:20px; font-weight:600; font-size:0.8rem; }
/* Modal sederhana */
.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; padding:2rem; overflow-y:auto; }
.modal.open { display:block; }
.modal-content { background:var(--surface); padding:2rem; border-radius:20px; max-width:600px; margin:auto; position:relative; }
.close { position:absolute; top:1rem; right:1rem; color:var(--text); font-size:1.5rem; cursor:pointer; }
</style>
</head>
<body>
<div id="pb"></div>
<nav>
  <div class="logo">Tech<em>Pulse</em></div>
  <button class="btn-theme" onclick="toggleTheme()">Ganti Tema</button>
</nav>
<div class="hero">
  <h1>Tren Tech Terkini,<br><span style="color:var(--accent)">Dirangkum AI</span></h1>
  <p style="color:var(--text-sub)">Website berita buatan sendiri yang online 24 jam!</p>
</div>
<div class="wrap" id="news-container">
  </div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeArt()">&times;</span>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const arts = [
  {cat:'AI', title:'GPT-5 Resmi Diluncurkan!', desc:'Model AI terbaru ini diklaim setara dengan developer senior dalam menulis kode.'},
  {cat:'STARTUP', title:'Startup RI Raih $50 Juta', desc:'Investasi besar masuk ke sektor AgriTech Indonesia minggu ini.'},
  {cat:'GADGET', title:'Snapdragon X2 Rilis', desc:'Chip ARM terkencang yang siap menantang dominasi laptop Intel.'}
];

function render() {
  const container = document.getElementById('news-container');
  container.innerHTML = arts.map((a, i) => `
    <div class="card" onclick="openArt(${i})">
      <div class="c-cat">${a.cat}</div>
      <div class="c-title">${a.title}</div>
      <p style="font-size:0.9rem; color:var(--text-sub)">${a.desc}</p>
    </div>
  `).join('');
}

function openArt(i) {
  const a = arts[i];
  document.getElementById('modal-body').innerHTML = `
    <h2 style="font-family:'Fraunces',serif; margin-bottom:1rem">${a.title}</h2>
    <p style="line-height:1.6; color:var(--text-sub)">Ini adalah isi berita lengkap dari ${a.title}. Berhasil dibuka dari GitHub!</p>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeArt() { document.getElementById('modal').classList.remove('open'); }

function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}

window.onscroll = () => {
  let scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
  document.getElementById("pb").style.width = scrolled + "%";
};

render();
</script>
</body>
</html>
